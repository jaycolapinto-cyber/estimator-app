name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # CI=true makes react-scripts treat warnings as errors — this project
      # has many pre-existing warnings, so build the production bundle in
      # non-CI mode.
      CI: "false"
    steps:
      # Use the auto-provided GITHUB_TOKEN (default) instead of a custom GH_TOKEN
      # secret. Sufficient for checkout + upload-artifact. Restore the custom
      # token if you later want electron-builder to auto-publish releases.
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install
      - name: Build app
        run: npm run desktop:build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/**
