<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 360"
  width="1200"
  height="360"
>
  <style>
    .decks {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 800;
      font-size: 160px;
      letter-spacing: 6px;
    }

    .unique {
      font-family: "Brush Script MT", "Segoe Script", "Pacifico", cursive;
      font-size: 170px;
    }

    .inc {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      font-size: 48px;
    }
  </style>

  <text
    x="50%"
    y="150"
    text-anchor="middle"
    fill="#000000"
    class="decks"
  >
    DECKS
  </text>

  <text
    x="50%"
    y="285"
    text-anchor="middle"
    fill="#000000"
    class="unique"
  >
    Unique
  </text>

  <text
    x="880"
    y="285"
    fill="#000000"
    class="inc"
  >
    INC
  </text>
</svg>
